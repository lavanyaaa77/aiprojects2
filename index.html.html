<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Cafe Colours</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream:#F5EFE0;--terra:#C8553D;--sage:#7A9E7E;--warm-black:#2C1A0E;--dusty-white:#FAF6EE;--rust:#A63D2F; }
  html,body{height:100%;overflow:hidden;}
  body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--warm-black);position:relative;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
  .app-shell{display:grid;grid-template-columns:220px 1fr 200px;grid-template-rows:64px 1fr;height:100vh;position:relative;z-index:1;}
  .topbar{grid-column:1/-1;background:var(--warm-black);display:flex;align-items:center;padding:0 20px;gap:16px;border-bottom:3px solid var(--terra);}
  .logo{font-family:'Abril Fatface',serif;font-size:20px;color:var(--cream);letter-spacing:0.5px;flex:1;}
  .logo span{color:var(--terra);}
  .topbar-actions{display:flex;align-items:center;gap:8px;}
  .tb-btn{background:transparent;border:1.5px solid rgba(245,239,224,0.3);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;}
  .tb-btn:hover{background:rgba(245,239,224,0.1);border-color:var(--cream);}
  .tb-btn.primary{background:var(--terra);border-color:var(--terra);color:var(--cream);}
  .tb-btn.primary:hover{background:var(--rust);}
  .undo-redo{display:flex;gap:4px;}
  .icon-btn{background:transparent;border:1.5px solid rgba(245,239,224,0.3);color:var(--cream);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.15s;}
  .icon-btn:hover{background:rgba(245,239,224,0.1);}
  .left-panel{background:var(--dusty-white);border-right:2px solid var(--warm-black);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:20px;}
  .panel-label{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--terra);margin-bottom:8px;}
  .illustration-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .illus-thumb{aspect-ratio:1;background:var(--cream);border:2px solid var(--warm-black);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px;transition:all 0.15s;position:relative;}
  .illus-thumb:hover{background:#EDE5D0;transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--warm-black);}
  .illus-thumb.active{background:var(--terra);border-color:var(--rust);transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--warm-black);}
  .illus-thumb.active .thumb-label{color:var(--cream);}
  .thumb-icon{font-size:22px;}
  .thumb-label{font-size:9px;font-weight:500;text-align:center;color:var(--warm-black);letter-spacing:0.3px;}
  .tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .tool-btn{background:var(--cream);border:2px solid var(--warm-black);padding:8px 4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--warm-black);display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.12s;letter-spacing:0.3px;}
  .tool-btn:hover{background:#EDE5D0;transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--warm-black);}
  .tool-btn.active{background:var(--warm-black);color:var(--cream);transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--terra);}
  .tool-icon{font-size:16px;}
  .canvas-area{background:var(--cream);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .canvas-container{position:relative;width:460px;height:460px;background:white;border:3px solid var(--warm-black);box-shadow:6px 6px 0 var(--warm-black);}
  #main-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;}
  .canvas-label{position:absolute;bottom:-28px;left:0;right:0;text-align:center;font-size:11px;color:rgba(44,26,14,0.45);letter-spacing:0.5px;}
  .right-panel{background:var(--dusty-white);border-left:2px solid var(--warm-black);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:20px;}
  .palette-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .swatch{aspect-ratio:1;border:2px solid var(--warm-black);cursor:pointer;transition:all 0.12s;}
  .swatch:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--warm-black);}
  .swatch.active{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--warm-black);outline:2px solid var(--warm-black);outline-offset:2px;}
  .current-color-display{height:44px;border:2px solid var(--warm-black);margin-bottom:8px;display:flex;align-items:center;justify-content:flex-end;padding:0 8px;}
  .hex-label{font-size:11px;font-weight:500;letter-spacing:0.5px;mix-blend-mode:difference;color:white;}
  .ambience-toggle{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .toggle-label{font-size:12px;font-weight:500;}
  .toggle-switch{width:36px;height:20px;background:rgba(44,26,14,0.15);border:1.5px solid var(--warm-black);position:relative;cursor:pointer;transition:background 0.2s;}
  .toggle-switch.on{background:var(--sage);}
  .toggle-knob{width:14px;height:14px;background:var(--warm-black);position:absolute;top:2px;left:2px;transition:transform 0.2s;}
  .toggle-switch.on .toggle-knob{transform:translateX(16px);}
  .volume-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .vol-label{font-size:10px;color:rgba(44,26,14,0.5);min-width:20px;}
  input[type=range].vol-slider{flex:1;-webkit-appearance:none;height:3px;background:var(--warm-black);outline:none;}
  input[type=range].vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--terra);border:2px solid var(--warm-black);cursor:pointer;}
  input[type=range].brush-slider{width:100%;-webkit-appearance:none;height:3px;background:var(--warm-black);outline:none;margin:8px 0;}
  input[type=range].brush-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--cream);border:2px solid var(--warm-black);cursor:pointer;}
  .brush-preview{display:flex;align-items:center;justify-content:center;height:32px;}
  .brush-dot{background:var(--warm-black);border-radius:50%;transition:width 0.1s,height 0.1s;}
  .completion-banner{position:absolute;inset:0;background:rgba(245,239,224,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:10;}
  .completion-banner.show{display:flex;}
  .completion-title{font-family:'Abril Fatface',serif;font-size:28px;color:var(--terra);}
  .stamp{width:80px;height:80px;border:4px solid var(--terra);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;animation:stamp-in 0.4s cubic-bezier(0.36,0.07,0.19,0.97);}
  @keyframes stamp-in{0%{transform:scale(2) rotate(-10deg);opacity:0;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="logo">Cozy Cafe <span>Colours</span></div>
    <div class="topbar-actions">
      <div class="undo-redo">
        <button class="icon-btn" id="undoBtn">↩</button>
        <button class="icon-btn" id="redoBtn">↪</button>
      </div>
      <button class="tb-btn" id="resetBtn">Reset</button>
      <button class="tb-btn primary" id="saveBtn">Save PNG</button>
    </div>
  </div>
  <div class="left-panel">
    <div>
      <div class="panel-label">Illustrations</div>
      <div class="illustration-grid">
        <div class="illus-thumb active" data-scene="window" onclick="switchScene('window')"><div class="thumb-icon">🪟</div><div class="thumb-label">Window Seat</div></div>
        <div class="illus-thumb" data-scene="pastry" onclick="switchScene('pastry')"><div class="thumb-icon">🥐</div><div class="thumb-label">Pastry Case</div></div>
        <div class="illus-thumb" data-scene="espresso" onclick="switchScene('espresso')"><div class="thumb-icon">☕</div><div class="thumb-label">Espresso Bar</div></div>
        <div class="illus-thumb" data-scene="bookshelf" onclick="switchScene('bookshelf')"><div class="thumb-icon">📚</div><div class="thumb-label">Bookshelf</div></div>
        <div class="illus-thumb" data-scene="armchair" onclick="switchScene('armchair')" style="grid-column:span 2;"><div class="thumb-icon">🪑</div><div class="thumb-label">Cozy Armchair</div></div>
      </div>
    </div>
    <div>
      <div class="panel-label">Tools</div>
      <div class="tool-grid">
        <button class="tool-btn active" data-tool="fill" onclick="selectTool('fill')"><span class="tool-icon">🪣</span>Fill</button>
        <button class="tool-btn" data-tool="brush" onclick="selectTool('brush')"><span class="tool-icon">🖌️</span>Brush</button>
        <button class="tool-btn" data-tool="eraser" onclick="selectTool('eraser')"><span class="tool-icon">⬜</span>Eraser</button>
        <button class="tool-btn" data-tool="picker" onclick="selectTool('picker')"><span class="tool-icon">💧</span>Picker</button>
      </div>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-container">
      <canvas id="main-canvas" width="460" height="460"></canvas>
      <div class="completion-banner" id="completionBanner">
        <div class="stamp">✓</div>
        <div class="completion-title">Gorgeous!</div>
        <button class="tb-btn primary" onclick="document.getElementById('completionBanner').classList.remove('show')">Keep colouring</button>
      </div>
      <div class="canvas-label">Click to fill · Drag to paint</div>
    </div>
  </div>
  <div class="right-panel">
    <div>
      <div class="panel-label">Colour</div>
      <div class="current-color-display" id="colorDisplay" style="background:#C8553D;"><span class="hex-label" id="hexLabel">#C8553D</span></div>
      <div class="palette-grid" id="paletteGrid"></div>
      <div style="margin-top:8px;"><input type="color" id="customColor" style="width:100%;height:28px;border:2px solid var(--warm-black);cursor:pointer;padding:0;"></div>
    </div>
    <div>
      <div class="panel-label">Brush Size</div>
      <input type="range" class="brush-slider" id="brushSize" min="2" max="30" value="8">
      <div class="brush-preview"><div class="brush-dot" id="brushDot" style="width:8px;height:8px;"></div></div>
    </div>
    <div>
      <div class="panel-label">Ambience</div>
      <div class="ambience-toggle"><span class="toggle-label">Café sounds</span><div class="toggle-switch" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div></div>
      <div class="ambience-toggle"><span class="toggle-label">Lo-fi beats</span><div class="toggle-switch" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div></div>
      <div class="ambience-toggle"><span class="toggle-label">Rain</span><div class="toggle-switch" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div></div>
      <div class="volume-row"><span class="vol-label">Vol</span><input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="60"><span class="vol-label" id="volVal">60</span></div>
    </div>
  </div>
</div>
<script>
const PALETTE=['#C8553D','#A63D2F','#D4923A','#F5EFE0','#7A9E7E','#6B7C4A','#C97B8A','#E8A598','#6B7FA3','#8B7BAF','#2C1A0E','#4A3728','#FAF6EE','#EDE5D0','#D4C5A9','#B8A88A','#5C8A6E','#3D6B52','#E8C49A','#F2D9B8','#8B4A5C','#C4956A','#7A6B8A','#A89060'];
let currentColor='#C8553D',currentTool='fill',brushSize=8,isDrawing=false,history=[],redoStack=[],currentScene='window';
const canvas=document.getElementById('main-canvas'),ctx=canvas.getContext('2d');
const W=460,H=460,BG='#FFFFFF',LC='#2C1A0E';
function buildPalette(){const g=document.getElementById('paletteGrid');g.innerHTML='';PALETTE.forEach(c=>{const s=document.createElement('div');s.className='swatch'+(c===currentColor?' active':'');s.style.background=c;s.title=c;s.onclick=()=>selectColor(c);g.appendChild(s);});}
function selectColor(c){currentColor=c;document.getElementById('colorDisplay').style.background=c;document.getElementById('hexLabel').textContent=c;document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.title===c));}
function selectTool(t){currentTool=t;document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));canvas.style.cursor=t==='brush'||t==='eraser'?'crosshair':t==='picker'?'cell':'default';}
function saveState(){history.push(ctx.getImageData(0,0,W,H));if(history.length>20)history.shift();redoStack=[];}
document.getElementById('undoBtn').onclick=()=>{if(history.length>1){redoStack.push(history.pop());ctx.putImageData(history[history.length-1],0,0);}};
document.getElementById('redoBtn').onclick=()=>{if(redoStack.length){const s=redoStack.pop();history.push(s);ctx.putImageData(s,0,0);}};
document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset this illustration?'))drawScene(currentScene);};
document.getElementById('saveBtn').onclick=()=>{const l=document.createElement('a');l.download='cozy-cafe-colours.png';l.href=canvas.toDataURL();l.click();};
document.getElementById('customColor').oninput=e=>selectColor(e.target.value);
document.getElementById('brushSize').oninput=e=>{brushSize=parseInt(e.target.value);const d=document.getElementById('brushDot');d.style.width=brushSize+'px';d.style.height=brushSize+'px';};
document.getElementById('volSlider').oninput=function(){document.getElementById('volVal').textContent=this.value;};
function hexToRgbArr(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function floodFill(sx,sy,fc){
  const id=ctx.getImageData(0,0,W,H),d=id.data;
  const idx=(sy*W+sx)*4,tr=d[idx],tg=d[idx+1],tb=d[idx+2],ta=d[idx+3];
  const[fr,fg,fb]=hexToRgbArr(fc);
  if(fr===tr&&fg===tg&&fb===tb)return;
  const stack=[[sx,sy]],vis=new Uint8Array(W*H);
  function match(i){return Math.abs(d[i]-tr)<30&&Math.abs(d[i+1]-tg)<30&&Math.abs(d[i+2]-tb)<30&&Math.abs(d[i+3]-ta)<30;}
  while(stack.length){const[x,y]=stack.pop();if(x<0||x>=W||y<0||y>=H)continue;const p=y*W+x;if(vis[p])continue;const j=p*4;if(!match(j))continue;vis[p]=1;d[j]=fr;d[j+1]=fg;d[j+2]=fb;d[j+3]=255;stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}
  ctx.putImageData(id,0,0);
}
function getXY(e){const r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;return[Math.floor((e.clientX-r.left)*sx),Math.floor((e.clientY-r.top)*sy)];}
canvas.addEventListener('mousedown',e=>{const[x,y]=getXY(e);if(currentTool==='fill'){saveState();floodFill(x,y,currentColor);}else if(currentTool==='picker'){const p=ctx.getImageData(x,y,1,1).data;selectColor('#'+[p[0],p[1],p[2]].map(v=>v.toString(16).padStart(2,'0')).join(''));selectTool('brush');}else{saveState();isDrawing=true;paint(x,y);}});
canvas.addEventListener('mousemove',e=>{if(!isDrawing)return;const[x,y]=getXY(e);paint(x,y);});
canvas.addEventListener('mouseup',()=>isDrawing=false);
canvas.addEventListener('mouseleave',()=>isDrawing=false);
function paint(x,y){ctx.beginPath();if(currentTool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.arc(x,y,brushSize,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,1)';ctx.fill();ctx.globalCompositeOperation='source-over';}else{ctx.arc(x,y,brushSize/2,0,Math.PI*2);ctx.fillStyle=currentColor;ctx.fill();}}
function switchScene(s){currentScene=s;document.querySelectorAll('.illus-thumb').forEach(t=>t.classList.toggle('active',t.dataset.scene===s));drawScene(s);}
function drawScene(s){ctx.clearRect(0,0,W,H);ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);history=[];({window:drawWindowSeat,pastry:drawPastryCase,espresso:drawEspressoBar,bookshelf:drawBookshelf,armchair:drawArmchair}[s])();saveState();}
function S(w=2){ctx.strokeStyle=LC;ctx.lineWidth=w;ctx.lineCap='round';ctx.lineJoin='round';}
function fillRect(x,y,w,h,sw=2){S(sw);ctx.fillStyle=BG;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);}
function fillEllipse(x,y,rx,ry,rot=0,sw=2){S(sw);ctx.fillStyle=BG;ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot,0,Math.PI*2);ctx.fill();ctx.stroke();}
function line(x1,y1,x2,y2,w=1.5){S(w);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function txt(t,x,y,font,align='center'){ctx.font=font;ctx.fillStyle=LC;ctx.textAlign=align;ctx.fillText(t,x,y);}
function drawWindowSeat(){
  ctx.save();
  fillRect(65,32,330,240,2.5);line(230,32,230,272,2);line(65,152,395,152,2);
  S(1);[[95,52],[138,84],[178,48],[260,74],[302,58],[344,88],[106,115],[212,98],[318,108],[168,165],[252,178],[290,158],[340,172],[84,188]].forEach(([x,y])=>{ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-3,y+13);ctx.stroke();});
  fillRect(42,270,376,20,2.5);fillRect(32,290,396,64,2.5);fillRect(54,283,352,32,2);
  S(1.5);[148,244,340].forEach(x=>line(x,283,x,315));
  fillEllipse(220,252,21,6,0,2);fillRect(200,252,40,36,2);
  S(2);ctx.beginPath();ctx.arc(241,270,11,-Math.PI/2,Math.PI/2);ctx.stroke();
  fillEllipse(220,288,27,8,0,2);
  S(1.5);[[212,244],[220,238],[228,244]].forEach(([x,y])=>{ctx.beginPath();ctx.moveTo(x,252);ctx.quadraticCurveTo(x-4,y+6,x,y);ctx.stroke();});
  fillRect(330,268,54,38,2);line(346,268,346,306,1.5);
  S(1.5);for(let y=275;y<304;y+=5)line(349,y,380,y);
  fillEllipse(108,292,17,10,0,2);
  S(2);line(108,282,108,250);ctx.beginPath();ctx.moveTo(108,265);ctx.quadraticCurveTo(130,255,142,240);ctx.stroke();ctx.beginPath();ctx.moveTo(108,270);ctx.quadraticCurveTo(86,258,74,244);ctx.stroke();
  fillEllipse(108,244,19,10,0,1.5);fillEllipse(142,238,16,9,0,1.5);fillEllipse(74,240,16,9,0,1.5);
  fillRect(0,354,460,106,1.5);S(1);[0,65,130,195,260,325,390,460].forEach(x=>line(x,354,x,460));
  ctx.restore();
}
function drawPastryCase(){
  ctx.save();
  fillRect(32,88,396,286,2.5);fillRect(22,72,416,26,2.5);
  [[50,374,20,80],[390,374,20,80]].forEach(([x,y,w,h])=>fillRect(x,y,w,h,2));
  fillRect(32,216,396,8,1.5);
  S(2.5);ctx.beginPath();ctx.ellipse(100,165,38,21,-0.3,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();
  S(1.5);ctx.beginPath();ctx.ellipse(100,165,26,13,-0.3,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();
  S(2.5);ctx.beginPath();ctx.ellipse(178,165,38,21,0.3,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();
  S(1.5);ctx.beginPath();ctx.ellipse(178,165,26,13,0.3,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();
  S(2.5);ctx.beginPath();ctx.moveTo(256,126);ctx.lineTo(298,126);ctx.lineTo(308,196);ctx.lineTo(246,196);ctx.closePath();ctx.fillStyle=BG;ctx.fill();ctx.stroke();
  S(1.5);line(246,167,308,167);line(246,180,308,180);fillEllipse(277,124,11,8,0,1.5);
  S(2);[[356,188],[356,170],[356,152]].forEach(([x,y])=>{fillEllipse(x,y,23,10,0,2);line(334,y,378,y,1);});
  S(2.5);fillEllipse(100,294,40,32,0,2.5);
  S(1.5);ctx.beginPath();ctx.ellipse(100,294,26,20,0,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(100,294,13,10,0,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();
  S(1.5);ctx.beginPath();ctx.moveTo(76,280);ctx.quadraticCurveTo(100,276,124,283);ctx.stroke();
  fillEllipse(210,294,42,32,0,2.5);fillEllipse(210,294,23,17,0,1.5);
  S(1);[[200,288],[212,284],[222,292],[204,300]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();ctx.stroke();});
  fillRect(278,258,108,38,2.5);line(283,258,381,258,1.5);line(283,273,381,273,1);
  S(1);[[100,342,'Cinnamon','$4.50'],[210,342,'Berry Tart','$5.25'],[332,342,'Eclair','$4.75']].forEach(([x,y,name,price])=>{fillRect(x-34,y,68,26,1);txt(name,x,y+11,'9px DM Sans');txt(price,x,y+23,'500 10px DM Sans');});
  txt('— Fresh Daily —',230,58,"bold 13px 'Abril Fatface',serif");
  ctx.restore();
}
